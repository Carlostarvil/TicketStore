spring.application.name=ticketapi

# --- SERVIDOR WEB ---
server.port=8081

# --- BASE DE DATOS (POSTGRESQL) ---
spring.datasource.url=jdbc:postgresql://localhost:5432/ticket_api
spring.datasource.username=postgres
